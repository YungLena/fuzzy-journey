<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>everything will be ok</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Bebas+Neue&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0b09; }

body { font-family: 'Space Mono', monospace; color: #e8e0d0; cursor: none; }

canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

.ui {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  padding: clamp(1.8rem, 4vw, 3.5rem);
  display: flex; flex-direction: column; justify-content: space-between;
}

.top-row { display: flex; justify-content: flex-end; align-items: flex-start; }
.bottom-row { display: flex; justify-content: space-between; align-items: flex-end; }

.nav { display: flex; gap: 2rem; align-items: center; pointer-events: auto; }

.nav a {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.25em;
  text-decoration: none; color: #ff4e00;
  text-transform: lowercase; opacity: 0.7;
  transition: opacity 0.2s; cursor: none;
}
.nav a:hover { opacity: 1; }

.name-block { pointer-events: none; }

.name-block h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(5rem, 14vw, 13rem);
  line-height: 0.82; letter-spacing: 0.04em;
  color: #ff4e00; text-transform: uppercase;
  mix-blend-mode: screen;
  animation: namebreath 4s ease-in-out infinite;
}

@keyframes namebreath {
  0%, 100% { text-shadow: 0 0 40px rgba(255,78,0,0.3), 0 0 80px rgba(255,78,0,0.1); transform: scale(1); }
  50% { text-shadow: 0 0 60px rgba(255,78,0,0.5), 0 0 120px rgba(255,78,0,0.2); transform: scale(1.005); }
}

.name-block h1 span {
  display: inline-block;
  animation: letterwobble 3s ease-in-out infinite;
  animation-delay: calc(var(--i) * 0.15s);
}

@keyframes letterwobble {
  0%, 100% { transform: translateY(0px); }
  30% { transform: translateY(-3px); }
  60% { transform: translateY(1px); }
}

.ok {
  font-family: 'Space Mono', monospace; font-style: italic;
  font-size: clamp(9px, 1.1vw, 11px); letter-spacing: 0.3em;
  color: #e8e0d0; opacity: 0.25; margin-top: 0.8rem; text-transform: lowercase;
}

.controls {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 0.15em; color: #e8e0d0; opacity: 0.18;
  text-transform: lowercase; line-height: 1.9; text-align: right;
}

.palette-id {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 0.2em; color: #ff4e00; opacity: 0.35;
  margin-bottom: 0.5rem; text-align: right; text-transform: lowercase;
}

.sound-hint {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 0.15em; color: #ff4e00; opacity: 0.0;
  text-transform: lowercase; margin-top: 0.4rem; text-align: right;
  transition: opacity 1.5s ease;
}

.cursor-dot {
  position: fixed; width: 5px; height: 5px; border-radius: 50%;
  background: #ff4e00; pointer-events: none; z-index: 100;
  transform: translate(-50%, -50%); mix-blend-mode: screen;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="top-row">
    <nav class="nav">
      <a href="#">work</a>
      <a href="#">about</a>
      <a href="#">contact</a>
    </nav>
  </div>

  <div class="bottom-row">
    <div class="name-block">
      <h1 id="nameEl"></h1>
      <p class="ok">everything will be ok</p>
    </div>
    <div style="text-align:right">
      <p class="palette-id" id="palname">deep water</p>
      <div class="controls">
        r — clear<br>
        c — colour<br>
        m — sound<br>
        s — save
      </div>
      <p class="sound-hint" id="soundhint">♪ on</p>
    </div>
  </div>
</div>

<div class="cursor-dot" id="dot"></div>

<script>
const nameEl = document.getElementById('nameEl');
nameEl.innerHTML = 'YUNGLENA'.split('').map((l,i)=>
  `<span style="--i:${i}">${l}</span>`).join('');

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dot = document.getElementById('dot');
const palname = document.getElementById('palname');
const soundhint = document.getElementById('soundhint');

let W, H, mx=-999, my=-999, pmx=-999, pmy=-999;
let trails=[], words=[], floaters=[];
let t=0, palIdx=0;
let audioCtx=null, soundOn=false, drones=[];

const PALETTES = [
  { name:'deep water',    bg:'#0c0b09', trail:['rgba(255,78,0,','rgba(220,160,80,','rgba(255,200,100,'], word:'rgba(255,78,0,' },
  { name:'arizona ice',   bg:'#080c0a', trail:['rgba(100,220,140,','rgba(60,200,120,','rgba(180,240,180,'], word:'rgba(80,220,130,' },
  { name:'cloud rap',     bg:'#0a080f', trail:['rgba(180,100,255,','rgba(220,150,255,','rgba(140,80,220,'], word:'rgba(200,130,255,' },
  { name:'ginseng strip', bg:'#0f0805', trail:['rgba(255,140,40,','rgba(255,200,80,','rgba(200,100,30,'],  word:'rgba(255,160,60,' },
];

// ── EDIT YOUR WORDS HERE ──────────────────────────────────────────
const WORDS = [
  'geese',
  'Pam Ewing',
  'the call is coming from inside the house',
  'polycule',
  'miniscule',
  'vibestrategist',
  'I own 51% of this company',
  'blue eyeshadow',
  'Magnolia',
  'Bill Callahan',
  'du behöver inte vara rädd',
  'tabis',
  'ta daa!',
  'du tänker för mycket',
  'tell me your ascendant baby',
];
// ─────────────────────────────────────────────────────────────────

function p() { return PALETTES[palIdx % PALETTES.length]; }

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.fillStyle = p().bg; ctx.fillRect(0,0,W,H);
}

function clear() {
  trails=[]; words=[];
  ctx.fillStyle = p().bg; ctx.fillRect(0,0,W,H);
}

// ── AMBIENT DRONE ─────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);

  const droneFreqs = [41.2, 55.0, 61.7, 82.4, 110.0];
  const detunes = [0, -8, 12, -5, 7];

  droneFreqs.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    osc.detune.value = detunes[i];

    filter.type = 'lowpass';
    filter.frequency.value = 400 + i * 80;
    filter.Q.value = 0.8;

    const vol = 0.04 - i * 0.005;
    gain.gain.value = vol;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start();

    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.03 + i * 0.007;
    lfoGain.gain.value = freq * 0.004;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();

    drones.push({ osc, gain, masterGain, lfo });
  });

  drones[0].masterGain = masterGain;
  return masterGain;
}

function toggleSound() {
  if (!audioCtx) {
    const master = initAudio();
    soundOn = true;
    master.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 3);
    soundhint.style.opacity = '0.5';
    soundhint.textContent = '♪ on';
  } else {
    soundOn = !soundOn;
    const master = drones[0].masterGain;
    if (soundOn) {
      master.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 2);
      soundhint.textContent = '♪ on';
      soundhint.style.opacity = '0.5';
    } else {
      master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
      soundhint.textContent = '♪ off';
      soundhint.style.opacity = '0.2';
    }
  }
}
// ──────────────────────────────────────────────────────────────────

class Trail {
  constructor(x,y,vx,vy) {
    this.x=x; this.y=y;
    this.vx=vx*0.25+(Math.random()-.5)*1.2;
    this.vy=vy*0.25+(Math.random()-.5)*1.2;
    this.r=0.6+Math.random()*2.8;
    this.alpha=0.4+Math.random()*0.5;
    this.decay=0.005+Math.random()*0.013;
    this.ci=Math.floor(Math.random()*3);
    this.w=Math.random()*Math.PI*2;
  }
  update() {
    this.x+=this.vx+Math.sin(this.w)*0.25;
    this.y+=this.vy+0.08;
    this.vx*=0.97; this.vy*=0.97;
    this.w+=0.05; this.alpha-=this.decay;
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=p().trail[this.ci]+this.alpha+')'; ctx.fill();
  }
  dead(){return this.alpha<=0;}
}

class FloatingWord {
  constructor(x,y) {
    this.x = x || 60+Math.random()*(W-120);
    this.y = y || H+30;
    this.word = WORDS[Math.floor(Math.random()*WORDS.length)];
    this.alpha = 0;
    this.target = 0.03+Math.random()*0.07;
    this.size = 9+Math.floor(Math.random()*8);
    this.vy = -(0.18+Math.random()*0.35);
    this.vx = (Math.random()-.5)*0.2;
    this.life = 0;
    this.maxLife = 200+Math.random()*350;
    this.fading = false;
    this.weight = Math.random()<0.3?'700':'400';
    this.italic = Math.random()<0.4;
  }
  update() {
    this.life++;
    this.y+=this.vy; this.x+=this.vx;
    if(!this.fading) this.alpha=Math.min(this.alpha+0.003,this.target);
    if(this.life>this.maxLife*0.65){this.fading=true; this.alpha-=0.0008;}
  }
  draw() {
    const style=this.italic?'italic ':'';
    ctx.font=`${style}${this.weight} ${this.size}px 'Space Mono', monospace`;
    ctx.fillStyle=p().word+this.alpha+')';
    ctx.fillText(this.word,this.x,this.y);
  }
  dead(){return this.fading&&this.alpha<=0;}
}

class Floater {
  constructor(){this.reset(); this.y=Math.random()*H; this.life=Math.random()*400;}
  reset(){
    this.x=Math.random()*W; this.y=H+10;
    this.r=0.2+Math.random()*0.7;
    this.vy=-(0.08+Math.random()*0.25);
    this.vx=(Math.random()-.5)*0.1;
    this.alpha=0; this.maxA=0.015+Math.random()*0.04;
    this.life=0; this.maxLife=400+Math.random()*600;
    this.w=Math.random()*Math.PI*2;
  }
  update(){
    this.life++;
    this.y+=this.vy; this.x+=this.vx+Math.sin(this.w+=0.02)*0.1;
    const pr=this.life/this.maxLife;
    if(pr<0.1)this.alpha=(pr/0.1)*this.maxA;
    else if(pr>0.8)this.alpha=((1-pr)/0.2)*this.maxA;
    else this.alpha=this.maxA;
    if(this.life>=this.maxLife||this.y<-5)this.reset();
  }
  draw(){
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(232,224,208,${this.alpha})`; ctx.fill();
  }
}

for(let i=0;i<70;i++) floaters.push(new Floater());

function spawnTrail(){
  const dvx=mx-pmx, dvy=my-pmy;
  const spd=Math.sqrt(dvx*dvx+dvy*dvy);
  if(spd<1)return;
  const n=Math.min(Math.floor(spd*0.4)+1,5);
  for(let i=0;i<n;i++)
    trails.push(new Trail(mx+(Math.random()-.5)*5,my+(Math.random()-.5)*5,dvx,dvy));
  if(spd>18&&Math.random()<0.12)
    words.push(new FloatingWord(mx+(Math.random()-.5)*60,my+(Math.random()-.5)*60));
}

function fade(){
  const bg=p().bg;
  const r=parseInt(bg.slice(1,3),16), g=parseInt(bg.slice(3,5),16), b=parseInt(bg.slice(5,7),16);
  ctx.fillStyle=`rgba(${r},${g},${b},0.016)`; ctx.fillRect(0,0,W,H);
}

function loop(){
  t++;
  fade();
  floaters.forEach(f=>{f.update();f.draw();});
  trails=trails.filter(tr=>{tr.update();tr.draw();return !tr.dead();});
  words=words.filter(w=>{w.update();w.draw();return !w.dead();});
  if(t%75===0&&Math.random()<0.5) words.push(new FloatingWord());
  pmx=mx; pmy=my;
  requestAnimationFrame(loop);
}

window.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
  spawnTrail();
});

window.addEventListener('click',e=>{
  for(let i=0;i<18;i++){
    const a=(i/18)*Math.PI*2, s=2+Math.random()*4;
    trails.push(new Trail(e.clientX,e.clientY,Math.cos(a)*s*5,Math.sin(a)*s*5));
  }
  words.push(new FloatingWord(e.clientX+(Math.random()-.5)*40,e.clientY+(Math.random()-.5)*40));
  words.push(new FloatingWord(e.clientX+(Math.random()-.5)*70,e.clientY+(Math.random()-.5)*70));
});

window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='r')clear();
  if(k==='c'){palIdx++; palname.textContent=PALETTES[palIdx%PALETTES.length].name; clear();}
  if(k==='m')toggleSound();
  if(k==='s'){const a=document.createElement('a');a.download='yunglena.png';a.href=canvas.toDataURL();a.click();}
});

window.addEventListener('touchmove',e=>{
  e.preventDefault();
  const touch=e.touches[0];
  mx=touch.clientX; my=touch.clientY;
  spawnTrail();
},{passive:false});

window.addEventListener('resize',resize);
resize();
loop();
</script>
</body>
</html>
