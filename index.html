<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yunglena</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Owners+Text:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0a0905;
    --paper: #e8e2d5;
    --bone: #d4cbba;
    --rust: #6b3728;
    --ash: #2a2620;
    --pale: #f2ede4;
  }

  html { height: 100%; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.7;
  }

  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  main {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: clamp(3rem, 8vw, 7rem);
    min-height: 100vh;
  }

  .eyebrow {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(11px, 1.2vw, 14px);
    letter-spacing: 0.25em;
    color: var(--bone);
    opacity: 0.6;
    margin-bottom: 2.5rem;
    text-transform: lowercase;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4.5rem, 12vw, 11rem);
    line-height: 0.88;
    letter-spacing: -0.02em;
    color: var(--paper);
    margin-bottom: 3rem;
    position: relative;
  }

  h1 em {
    font-style: italic;
    color: var(--bone);
    opacity: 0.7;
    display: block;
  }

  .rule {
    width: 1px;
    height: clamp(40px, 6vw, 80px);
    background: var(--rust);
    margin-bottom: 2.5rem;
    opacity: 0.8;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    color: var(--bone);
    opacity: 0.55;
    max-width: 38ch;
    line-height: 1.6;
    margin-bottom: 4rem;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .nav-links a {
    font-family: 'IM Fell English', serif;
    font-size: clamp(11px, 1.1vw, 13px);
    letter-spacing: 0.3em;
    text-decoration: none;
    color: var(--paper);
    opacity: 0.4;
    text-transform: lowercase;
    transition: opacity 0.4s ease;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--rust);
    transition: width 0.4s ease;
  }

  .nav-links a:hover { opacity: 0.9; }
  .nav-links a:hover::after { width: 100%; }

  .nav-links span {
    color: var(--rust);
    opacity: 0.5;
    font-size: 10px;
  }

  footer {
    position: relative;
    z-index: 2;
    padding: 2rem clamp(3rem, 8vw, 7rem);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(212, 203, 186, 0.06);
  }

  footer p {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--bone);
    opacity: 0.25;
    text-transform: lowercase;
  }

  .corner-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--bone);
    opacity: 0.18;
    text-transform: lowercase;
  }

  .float-text {
    position: fixed;
    right: clamp(1.5rem, 4vw, 3.5rem);
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    transform-origin: center center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--bone);
    opacity: 0.18;
    z-index: 3;
    white-space: nowrap;
    text-transform: lowercase;
  }

  .schiele-line {
    position: fixed;
    top: 0;
    left: clamp(2rem, 5vw, 4rem);
    width: 1px;
    height: 100vh;
    background: linear-gradient(to bottom, transparent, var(--rust) 30%, var(--rust) 70%, transparent);
    opacity: 0.12;
    z-index: 1;
  }

  @keyframes surfaceShimmer {
    0%, 100% { opacity: 0.06; }
    50% { opacity: 0.12; }
  }

  .water-shimmer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35vh;
    background: linear-gradient(to top, rgba(107, 55, 40, 0.08), transparent);
    z-index: 1;
    animation: surfaceShimmer 6s ease-in-out infinite;
    pointer-events: none;
  }

</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="grain"></div>
<div class="schiele-line"></div>
<div class="water-shimmer"></div>
<div class="float-text">ongoing — undeclared</div>

<main>
  <div class="center">
    <p class="eyebrow">yunglena.com — est. now</p>
    <h1>
      yung<br>
      <em>lena</em>
    </h1>
    <div class="rule"></div>
    <p class="tagline">everything is connected. most of it has been forgotten. some of it is being rescued.</p>
    <nav class="nav-links">
      <a href="#">work</a>
      <span>·</span>
      <a href="#">about</a>
      <span>·</span>
      <a href="#">contact</a>
    </nav>
  </div>

  <footer>
    <p>all rights reserved — probably</p>
    <span class="corner-mark">yunglena.com</span>
  </footer>
</main>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [], animId;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function Particle() {
  this.reset = function() {
    this.x = Math.random() * W;
    this.y = Math.random() * H + H;
    this.vy = -(0.15 + Math.random() * 0.5);
    this.vx = (Math.random() - 0.5) * 0.2;
    this.size = 0.4 + Math.random() * 1.2;
    this.alpha = 0;
    this.maxAlpha = 0.03 + Math.random() * 0.12;
    this.life = 0;
    this.maxLife = 200 + Math.random() * 400;
  };
  this.reset();
  this.y = Math.random() * H;
  this.life = Math.random() * this.maxLife;
}

function init() {
  particles = [];
  for (let i = 0; i < 120; i++) particles.push(new Particle());
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const grad = ctx.createRadialGradient(W * 0.35, H * 0.6, 0, W * 0.35, H * 0.6, H * 0.9);
  grad.addColorStop(0, 'rgba(42, 38, 32, 0.95)');
  grad.addColorStop(0.5, 'rgba(15, 12, 8, 0.97)');
  grad.addColorStop(1, 'rgba(10, 9, 5, 1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const depthGrad = ctx.createLinearGradient(0, 0, 0, H);
  depthGrad.addColorStop(0, 'rgba(107, 55, 40, 0.04)');
  depthGrad.addColorStop(0.4, 'rgba(107, 55, 40, 0.01)');
  depthGrad.addColorStop(1, 'rgba(107, 55, 40, 0.09)');
  ctx.fillStyle = depthGrad;
  ctx.fillRect(0, 0, W, H);

  particles.forEach(p => {
    p.life++;
    p.x += p.vx + Math.sin(p.life * 0.01) * 0.15;
    p.y += p.vy;

    const progress = p.life / p.maxLife;
    if (progress < 0.15) p.alpha = (progress / 0.15) * p.maxAlpha;
    else if (progress > 0.75) p.alpha = ((1 - progress) / 0.25) * p.maxAlpha;
    else p.alpha = p.maxAlpha;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212, 203, 186, ${p.alpha})`;
    ctx.fill();

    if (p.life >= p.maxLife || p.y < -20) p.reset();
  });

  for (let i = 0; i < 3; i++) {
    const x = W * (0.1 + i * 0.35);
    const y = H * (0.3 + Math.sin(Date.now() * 0.0003 + i) * 0.05);
    const r = H * (0.15 + i * 0.08);
    const wg = ctx.createRadialGradient(x, y, 0, x, y, r);
    wg.addColorStop(0, `rgba(107, 55, 40, 0.03)`);
    wg.addColorStop(1, 'transparent');
    ctx.fillStyle = wg;
    ctx.fillRect(0, 0, W, H);
  }

  animId = requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); init(); });
resize();
init();
draw();

document.addEventListener('mousemove', e => {
  const x = e.clientX, y = e.clientY;
  for (let i = 0; i < 2; i++) {
    const p = new Particle();
    p.x = x + (Math.random() - 0.5) * 20;
    p.y = y + (Math.random() - 0.5) * 20;
    p.vy = -(0.3 + Math.random() * 0.8);
    p.maxAlpha = 0.06 + Math.random() * 0.1;
    p.maxLife = 80 + Math.random() * 120;
    particles.push(p);
    if (particles.length > 200) particles.shift();
  }
});
</script>
</body>
</html>
